<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <style>
    body {
      background-color: plum;
      display: flex;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .content {
      background: whitesmoke;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 8px rgba(0, 0, 0, 0.1);
      width: 100%;
    }
    h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: black;
    }
    .clear {
      background-color: rgb(218, 102, 242);
      color: rgb(233, 148, 148);
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 14px;
    }
    .picture img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-right: 16px;
      object-fit: cover;
    }
    p {
      text-align: center;
    }
  </style>

      <div class="persol">
        <p>

        <p>32 years</p>
      </div>

      </div>
      <div class="person">
        <div class="picture"><img src="images/dera.jpg" alt="" /></div>

      <div>

</html>
